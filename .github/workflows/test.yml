name: AI Agent

on:

  workflow_dispatch:

jobs:

  run-agent:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Run Agent

        run: |

          python monitor.py

      - name: Send Mail

        env:

          EMAIL_USER: ${{ secrets.EMAIL_USER }}

          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

          EMAIL_TO: ${{ secrets.EMAIL_TO }}

        run: |

          python send_mail.py
