name: AI Stock Agent

on:

  workflow_dispatch:

  schedule:
    - cron: "*/15 1-7 * * 1-5"

    # 开盘前

    - cron: "20 1 * * 1-5"

    # 午盘

    - cron: "30 4 * * 1-5"

    # 收盘

    - cron: "10 7 * * 1-5"

jobs:

  run-agent:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository

      uses: actions/checkout@v4

    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.11"

    - name: Install Packages

      run: |

        pip install requests

        pip install pandas

        pip install akshare==1.17.35

        pip install pywencai
        
        pip install google-generativeai

    - name: Check Files

      run: |
        pwd
        ls -al
        cat market_data.py
    - name: Market Data

      run: python market_data.py

    - name: Check Files

      run: ls -lah
      
    - name: Fund Flow

      continue-on-error: true

      run: python fund_flow.py

    - name: AI Analysis

      env:

        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      run: python ai_analysis.py 

    - name: Monitor

      run: python monitor.py
      
    - name: Realtime Monitor

      env:

        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}

      run: python monitor_realtime.py
      
    - name: Send WeCom

      env:

        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}

      run: python send_wecom.py
