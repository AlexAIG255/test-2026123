name: AI Stock Agent

on:

  workflow_dispatch:

jobs:

  run-agent:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Install Packages

        run: |

          pip install requests
          pip install pandas
          pip install akshare

      - name: Run Agent

        run: |

          python monitor.py
          - name: Market Data

        run: python market_data.py
        
      - name: Fund Flow

        run: python fund_flow.py

      - name: Analysis
      
        run: python analysis.py

      - name: Monitor

        run: python monitor.py

      - name: Send WeCom
       
        run: python send_wecom.py
          
